name: Release Windows Build

on:
  push:
    tags:
      - 'v*'  # Trigger khi push tag kiểu v1.0.0, v1.2.3,...

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Install Docker (dùng để fyne-cross build)
        uses: docker/setup-buildx-action@v3

      - name: Build for Windows
        run: |
          fyne-cross windows -arch amd64 -icon icon.png -name "Traphaco OCR"

      - name: Prepare dist folder
        run: |
          mkdir -p dist_windows
          cp -R fyne-cross/dist/windows-amd64/* dist_windows/
          cp -R bin dist_windows/
          cp -R models dist_windows/
          zip -r "Traphaco_OCR_Windows.zip" dist_windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Traphaco_OCR_Windows.zip
          generate_release_notes: true  # Tự động tạo changelog từ commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}